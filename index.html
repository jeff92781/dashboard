<title>Previsão de Estoque — CD Recife</title>

:root{--bg:#0e1117;--sur:#161b27;--sur2:#1e2537;--bdr:#2a3248;--ah:#00c2ff;--aa:#ff6b35;--tx:#dce3f0;--txd:#7a89a8;--gn:#29d984;--yw:#f5c842;--rd:#ff4d6d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;}
header{background:var(--sur);border-bottom:1px solid var(--bdr);padding:18px 28px 14px;display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;}
.logo h1{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;letter-spacing:.04em;}
.logo span{font-size:11px;color:var(--txd);letter-spacing:.08em;text-transform:uppercase;}
.tabs{display:flex;gap:4px;margin-left:auto;}
.tab{padding:8px 20px;border-radius:6px 6px 0 0;border:1px solid var(--bdr);border-bottom:none;background:transparent;color:var(--txd);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .15s;}
.tab:hover{color:var(--tx);background:var(--sur2);}
.act-h{color:var(--ah)!important;border-color:var(--ah)!important;background:rgba(0,194,255,.07)!important;}
.act-a{color:var(--aa)!important;border-color:var(--aa)!important;background:rgba(255,107,53,.07)!important;}
.abar{height:2px;}
.abar-h{background:var(--ah);}
.abar-a{background:var(--aa);}
.ctrl{background:var(--sur);border-bottom:1px solid var(--bdr);padding:11px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.clbl{font-size:11px;color:var(--txd);text-transform:uppercase;letter-spacing:.07em;}
input[type=text]{background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;color:var(--tx);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:6px 10px;outline:none;transition:border-color .15s;width:210px;}
input[type=text]:focus{border-color:var(--ah);}
.cg{display:flex;gap:6px;align-items:center;}
.cg label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;background:var(--sur2);border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;transition:all .15s;}
.cg label:hover{border-color:var(--txd);}
.cg input[type=checkbox]{display:none;}
.la{border-color:var(--gn)!important;color:var(--gn)!important;background:rgba(41,217,132,.08)!important;}
.lb{border-color:var(--yw)!important;color:var(--yw)!important;background:rgba(245,200,66,.08)!important;}
.lc{border-color:#ff6b35!important;color:#ff6b35!important;background:rgba(255,107,53,.08)!important;}
.sep{width:1px;height:26px;background:var(--bdr);}
.sdb{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--txd);font-size:12px;padding:6px 12px;cursor:pointer;transition:all .15s;}
.sdb.on{border-color:var(--rd);color:var(--rd);background:rgba(255,77,109,.07);}
.sdb:hover{border-color:var(--txd);color:var(--tx);}
.sp{flex:1;}
.expbtn{display:flex;align-items:center;gap:7px;background:var(--ah);color:#000;border:none;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em;padding:8px 16px;cursor:pointer;transition:opacity .15s;}
.expbtn:hover{opacity:.85;}
.expbtn.ea{background:var(--aa);}
.sumbar{display:flex;border-bottom:1px solid var(--bdr);}
.sc{flex:1;padding:13px 20px;border-right:1px solid var(--bdr);}
.sc:last-child{border-right:none;}
.sc .v{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc .l{font-size:11px;color:var(--txd);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.sh .v{color:var(--ah);}
.sa .v{color:var(--aa);}
.sd .v{color:var(--rd);}
.sg .v{color:var(--gn);}
.twrap{overflow-x:auto;padding:0 16px 40px;}
table{width:100%;border-collapse:collapse;margin-top:12px;}
thead th{position:sticky;top:0;background:var(--sur);border-bottom:2px solid var(--bdr);padding:9px 12px;text-align:left;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txd);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--tx);}
thead th.sas::after{content:' ▲';color:var(--ah);}
thead th.sds::after{content:' ▼';color:var(--ah);}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .1s;}
tbody tr:hover{background:var(--sur2);}
tbody tr.disc{opacity:.42;}
tbody tr.disc td{text-decoration:line-through;color:var(--txd);}
tbody tr.disc td:first-child,tbody tr.disc td:last-child{text-decoration:none;}
td{padding:8px 12px;vertical-align:middle;white-space:nowrap;}
td.dsc{white-space:normal;min-width:280px;max-width:420px;}
.badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.05em;}
.bA{background:rgba(41,217,132,.14);color:var(--gn);border:1px solid rgba(41,217,132,.3);}
.bB{background:rgba(245,200,66,.11);color:var(--yw);border:1px solid rgba(245,200,66,.3);}
.bC{background:rgba(255,107,53,.11);color:#ff6b35;border:1px solid rgba(255,107,53,.3);}
.cod{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--txd);}
.nr{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:13px;}
.qwrap{display:flex;align-items:center;justify-content:flex-end;}
.qi{background:transparent;border:1px solid transparent;border-radius:4px;color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:right;width:90px;padding:3px 6px;transition:all .15s;cursor:pointer;}
.qi:hover{border-color:var(--bdr);background:var(--sur2);}
.qi:focus{border-color:var(--ah);background:var(--sur2);outline:none;cursor:text;}
.qi.mod{color:var(--yw);border-color:rgba(245,200,66,.35);}
.th{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.th-h{color:rgba(0,194,255,.9);}
.th-a{color:rgba(255,107,53,.9);}
.db{background:transparent;border:1px solid var(--bdr);border-radius:4px;color:var(--txd);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.db:hover{border-color:var(--rd);color:var(--rd);}
.db.on{border-color:var(--rd);color:var(--rd);background:rgba(255,77,109,.08);}
.db.on:hover{background:rgba(255,77,109,.15);}
.empty{text-align:center;padding:60px;color:var(--txd);}
</style>

  <div class="sep"></div>
  <button class="sdb" id="sdb" onclick="tgd()">👁 Mostrar descontinuados</button>
  <div class="sp"></div>
  <button class="expbtn" id="eb" onclick="exp()">⬇ Exportar CSV</button>
</div>
<div class="sumbar" id="sumbar"></div>
<div class="twrap">
  <table>
    <thead>

      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>

</div>

["H0401050","CABO COBRE NÚ TMD 1 X 50 mm² 7FIOS NORMA",500,"C",28.5543]
]};
let tab='h',showD=false,sCol=null,sDir=1;
const ST={h:{disc:new Set(),qtds:{}},a:{disc:new Set(),qtds:{}}};
const CL={A:true,B:true,C:true};
const brl=v=>'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const num=v=>v.toLocaleString('pt-BR');
function sw(t){tab=t;document.getElementById('th').className='tab'+(t==='h'?' act-h':'');document.getElementById('ta').className='tab'+(t==='a'?' act-a':'');document.getElementById('ab').className='abar abar-'+(t==='h'?'h':'a');document.getElementById('eb').className='expbtn'+(t==='a'?' ea':'');render();}
function tgc(c){CL[c]=!CL[c];document.getElementById('l'+c).className=CL[c]?'l'+c.toLowerCase():'';render();}
function tgd(){showD=!showD;const b=document.getElementById('sdb');b.className='sdb'+(showD?' on':'');b.textContent=showD?'🙈 Ocultar descontinuados':'👁 Mostrar descontinuados';render();}
function tgi(cod){const s=ST[tab];s.disc.has(cod)?s.disc.delete(cod):s.disc.add(cod);render();}
function onq(cod,val){const v=parseInt(val.replace(/\./g,'').replace(',',''));if(!isNaN(v)&&v>=0)ST[tab].qtds[cod]=v;render();}
function srt(col){sCol===col?sDir*=-1:(sCol=col,sDir=1);document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sas','sds'));const map=['cod','desc','cls','qtd','unit','tot'];const ths=document.querySelectorAll('thead th');const i=map.indexOf(col);if(i>=0)ths[i].classList.add(sDir===1?'sas':'sds');render();}
function render(){
  const s=ST[tab],q=document.getElementById('si').value.toLowerCase().trim();
  const tc=tab==='h'?'th-h':'th-a';
  let rows=D[tab].map(r=>{const[cod,desc,q0,cls,unit]=r;const qtd=s.qtds[cod]!==undefined?s.qtds[cod]:q0;return{cod,desc,qtd,q0,cls,unit,tot:qtd*unit,disc:s.disc.has(cod)};});
  rows=rows.filter(r=>{if(!showD&&r.disc)return false;if(!CL[r.cls])return false;if(q&&!r.cod.toLowerCase().includes(q)&&!r.desc.toLowerCase().includes(q))return false;return true;});
  if(sCol){rows.sort((a,b)=>{const av=a[sCol],bv=b[sCol];return(typeof av==='string'?av.localeCompare(bv):av-bv)*sDir;});}
  const act=rows.filter(r=>!r.disc);
  const tA=act.reduce((s,r)=>s+r.tot,0),mA=act.reduce((s,r)=>s+r.qtd,0),nD=rows.filter(r=>r.disc).length,tG=rows.reduce((s,r)=>s+r.tot,0);
  document.getElementById('sumbar').innerHTML=`<div class="sc ${tab==='h'?'sh':'sa'}"><div class="v">${brl(tA)}</div><div class="l">Total ativo</div></div><div class="sc"><div class="v">${num(mA)} m</div><div class="l">Metros ativos</div></div><div class="sc sg"><div class="v">${act.length}</div><div class="l">Itens ativos</div></div><div class="sc sd"><div class="v">${nD}</div><div class="l">Descontinuados</div></div><div class="sc"><div class="v">${brl(tG)}</div><div class="l">Total geral (vis.)</div></div>`;
  const tb=document.getElementById('tb');
  if(!rows.length){tb.innerHTML='';document.getElementById('em').style.display='block';return;}
  document.getElementById('em').style.display='none';
  tb.innerHTML=rows.map(r=>{const mod=ST[tab].qtds[r.cod]!==undefined&&ST[tab].qtds[r.cod]!==r.q0;return`<tr class="${r.disc?'disc':''}"><td class="cod">${r.cod}</td><td class="dsc">${r.desc}</td><td><span class="badge b${r.cls}">${r.cls}</span></td><td class="nr"><div class="qwrap"><input class="qi${mod?' mod':''}" type="text" value="${num(r.qtd)}" onblur="onq('${r.cod}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" onfocus="this.select()"></div></td><td class="nr">${brl(r.unit)}</td><td class="th ${tc}">${brl(r.tot)}</td><td style="text-align:center"><button class="db${r.disc?' on':''}" onclick="tgi('${r.cod}')">${r.disc?'↩ Reativar':'✕ Descontinuar'}</button></td></tr>`;}).join('');
}
function exp(){const s=ST[tab],lbl=tab==='h'?'HEPR':'HEPR_ATOX';const hdr=['Cenario','Codigo','Descricao','Classe','Qtd_Ideal','Qtd_Ajustada','Vlr_Unit','Total','Status'];const rows=D[tab].map(r=>{const[cod,desc,q0,cls,unit]=r;const qtd=s.qtds[cod]!==undefined?s.qtds[cod]:q0;return[lbl,cod,`"${desc}"`,cls,q0,qtd,unit.toFixed(4),(qtd*unit).toFixed(2),s.disc.has(cod)?'DESCONTINUADO':'ATIVO'].join(';');});const csv=[hdr.join(';'),...rows].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download=`CD_Recife_${lbl}_${new Date().toISOString().slice(0,10)}.csv`;a.click();}
render();
</script>
