<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Previsão de Estoque — CD Recife</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0e1117;
    --surface:   #161b27;
    --surface2:  #1e2537;
    --border:    #2a3248;
    --accent-h:  #00c2ff;
    --accent-a:  #ff6b35;
    --text:      #dce3f0;
    --text-dim:  #7a89a8;
    --green:     #29d984;
    --yellow:    #f5c842;
    --red:       #ff4d6d;
    --class-a:   #29d984;
    --class-b:   #f5c842;
    --class-c:   #ff6b35;
    --disc:      #3a4255;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-block { flex: 1 1 220px; }
  .logo-block h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--text);
  }
  .logo-block span {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .tab-group {
    display: flex;
    gap: 4px;
  }

  .tab-btn {
    padding: 8px 18px;
    border-radius: 6px 6px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active.hepr { color: var(--accent-h); border-color: var(--accent-h); background: rgba(0,194,255,.06); }
  .tab-btn.active.hepratox { color: var(--accent-a); border-color: var(--accent-a); background: rgba(255,107,53,.06); }

  /* ── CONTROLS ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .ctrl-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em; margin-right: 4px; }

  input[type=text], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent-h); }
  input[type=text] { width: 220px; }

  .check-group { display: flex; gap: 8px; align-items: center; }
  .check-group label {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; cursor: pointer;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 11px;
    transition: all .15s;
  }
  .check-group label:hover { border-color: var(--text-dim); }
  .check-group input[type=checkbox] { display: none; }
  .check-group label.active-a { border-color: var(--class-a); color: var(--class-a); background: rgba(41,217,132,.08); }
  .check-group label.active-b { border-color: var(--class-b); color: var(--class-b); background: rgba(245,200,66,.08); }
  .check-group label.active-c { border-color: var(--class-c); color: var(--class-c); background: rgba(255,107,53,.08); }

  .ctrl-sep { width: 1px; height: 28px; background: var(--border); }

  .show-disc-btn {
    display: flex; align-items: center; gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .show-disc-btn.active { border-color: var(--red); color: var(--red); background: rgba(255,77,109,.07); }
  .show-disc-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .spacer { flex: 1; }

  .btn-export {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent-h);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 8px 16px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-export:hover { opacity: .85; }
  .btn-export.hepratox { background: var(--accent-a); }

  /* ── SUMMARY BAR ── */
  .summary {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .sum-card {
    flex: 1;
    padding: 14px 20px;
    border-right: 1px solid var(--border);
    min-width: 0;
  }
  .sum-card:last-child { border-right: none; }
  .sum-card .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sum-card .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em; margin-top: 2px; }
  .sum-card.hepr .val  { color: var(--accent-h); }
  .sum-card.atox .val  { color: var(--accent-a); }
  .sum-card.disc .val  { color: var(--red); }
  .sum-card.active-items .val { color: var(--green); }

  /* ── TABLE ── */
  .table-wrapper {
    overflow-x: auto;
    padding: 0 16px 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: ' ▲'; color: var(--accent-h); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--accent-h); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.discontinued {
    opacity: .45;
    background: rgba(58,66,85,.2);
  }
  tbody tr.discontinued td { text-decoration: line-through; color: var(--text-dim); }
  tbody tr.discontinued td:first-child { text-decoration: none; }

  td {
    padding: 9px 12px;
    vertical-align: middle;
    white-space: nowrap;
  }
  td.desc-cell { white-space: normal; min-width: 280px; max-width: 400px; }

  .badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: .05em;
  }
  .badge-A { background: rgba(41,217,132,.15); color: var(--class-a); border: 1px solid rgba(41,217,132,.3); }
  .badge-B { background: rgba(245,200,66,.12); color: var(--class-b); border: 1px solid rgba(245,200,66,.3); }
  .badge-C { background: rgba(255,107,53,.12); color: var(--class-c); border: 1px solid rgba(255,107,53,.3); }

  .code-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .num-cell { text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  /* editable qty */
  .qty-wrap { display: flex; align-items: center; gap: 4px; }
  .qty-input {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    text-align: right;
    width: 90px;
    padding: 3px 6px;
    transition: all .15s;
    cursor: pointer;
  }
  .qty-input:hover { border-color: var(--border); background: var(--surface2); }
  .qty-input:focus { border-color: var(--accent-h); background: var(--surface2); outline: none; cursor: text; }
  .qty-input.modified { color: var(--yellow); border-color: rgba(245,200,66,.4); }

  .total-cell { text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; }
  .total-hepr  { color: rgba(0,194,255,.9); }
  .total-atox  { color: rgba(255,107,53,.9); }

  /* disc toggle */
  .disc-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 11px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .disc-btn:hover { border-color: var(--red); color: var(--red); }
  .disc-btn.is-disc { border-color: var(--red); color: var(--red); background: rgba(255,77,109,.08); }
  .disc-btn.is-disc:hover { background: rgba(255,77,109,.15); }

  .empty-msg { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; }

  /* accent line on active tab */
  .accent-line { height: 2px; }
  .accent-line.hepr    { background: var(--accent-h); }
  .accent-line.hepratox { background: var(--accent-a); }
</style>
</head>

<header>
  <div class="logo-block">
    <h1>CD RECIFE — PREVISÃO DE ESTOQUE</h1>
    <span>Cenários de abertura · Jun 2025</span>
  </div>
  <div class="tab-group">
    <button class="tab-btn hepr active" onclick="switchTab('hepr')">HEPR</button>
    <button class="tab-btn hepratox" onclick="switchTab('hepratox')">HEPR ATOX</button>
  </div>
</header>

<div id="accent-bar" class="accent-line hepr"></div>

<div class="controls">
  <span class="ctrl-label">Buscar</span>
  <input type="text" id="searchInput" placeholder="código, descrição…" oninput="applyFilters()">

  <div class="ctrl-sep"></div>

  <span class="ctrl-label">Classe</span>
  <div class="check-group">
    <label id="lbl-a" class="active-a" onclick="toggleClass('A')"><input type="checkbox" id="chk-a" checked> A</label>
    <label id="lbl-b" class="active-b" onclick="toggleClass('B')"><input type="checkbox" id="chk-b" checked> B</label>
    <label id="lbl-c" class="active-c" onclick="toggleClass('C')"><input type="checkbox" id="chk-c" checked> C</label>
  </div>

  <div class="ctrl-sep"></div>

  <button class="show-disc-btn" id="showDiscBtn" onclick="toggleShowDisc()">
    <span>👁</span> Mostrar descontinuados
  </button>

  <div class="spacer"></div>

  <button class="btn-export" id="exportBtn" onclick="exportCSV()">⬇ Exportar CSV</button>
</div>

<!-- SUMMARY -->
<div class="summary" id="summaryBar"></div>

<!-- TABLE -->
<div class="table-wrapper">
  <table id="mainTable">
    <thead>
      <tr>
        <th onclick="sortBy('codigo')">Código</th>
        <th onclick="sortBy('descricao')">Descrição</th>
        <th onclick="sortBy('classe')">Classe</th>
        <th onclick="sortBy('qtd')" style="text-align:right">Qtd Ideal</th>
        <th onclick="sortBy('unitario')" style="text-align:right">Vlr Unit.</th>
        <th onclick="sortBy('total')" style="text-align:right">Total</th>
        <th style="text-align:center; width:120px">Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="emptyMsg" class="empty-msg" style="display:none">Nenhum item encontrado com os filtros aplicados.</div>
</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let activeTab = 'hepr';
let showDisc  = false;
let sortCol   = null;
let sortDir   = 1;

// per-tab state: discontinued & modified quantities
const state = {
  hepr:     { disc: new Set(), qtds: {} },
  hepratox: { disc: new Set(), qtds: {} }
};

const classes = { A: true, B: true, C: true };

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const brl = v => 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const num = v => v.toLocaleString('pt-BR');

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn.${tab}`).classList.add('active');
  document.getElementById('accent-bar').className = `accent-line ${tab}`;
  const exp = document.getElementById('exportBtn');
  exp.className = tab === 'hepr' ? 'btn-export' : 'btn-export hepratox';
  applyFilters();
}

function toggleClass(cls) {
  classes[cls] = !classes[cls];
  const lbl = document.getElementById(`lbl-${cls.toLowerCase()}`);
  const chk = document.getElementById(`chk-${cls.toLowerCase()}`);
  chk.checked = classes[cls];
  lbl.className = classes[cls] ? `active-${cls.toLowerCase()}` : '';
  applyFilters();
}

function toggleShowDisc() {
  showDisc = !showDisc;
  const btn = document.getElementById('showDiscBtn');
  btn.classList.toggle('active', showDisc);
  btn.innerHTML = showDisc ? '<span>🙈</span> Ocultar descontinuados' : '<span>👁</span> Mostrar descontinuados';
  applyFilters();
}

function toggleDisc(codigo) {
  const s = state[activeTab];
  if (s.disc.has(codigo)) s.disc.delete(codigo);
  else s.disc.add(codigo);
  applyFilters();
}

function onQtyChange(codigo, val) {
  const parsed = parseInt(val.replace(/\./g,'').replace(',',''));
  if (!isNaN(parsed) && parsed >= 0) {
    state[activeTab].qtds[codigo] = parsed;
  }
  applyFilters();
}

// ═══════════════════════════════════════════════════
// SORT
// ═══════════════════════════════════════════════════
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const map = { codigo:0, descricao:1, qtd:2, classe:3, unitario:4, total:-1 };
  const ths = document.querySelectorAll('thead th');
  const idx = ['codigo','descricao','classe','qtd','unitario','total'];
  const thEl = ths[idx.indexOf(col)];
  if (thEl) thEl.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  applyFilters();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function applyFilters() {
  const s     = state[activeTab];
  const q     = document.getElementById('searchInput').value.toLowerCase().trim();
  const data  = RAW[activeTab];
  const tcls  = activeTab === 'hepr' ? 'total-hepr' : 'total-atox';

  let rows = data.map(r => {
    const [cod, desc, qtdOrig, cls, unit] = r;
    const qtd   = s.qtds[cod] !== undefined ? s.qtds[cod] : qtdOrig;
    const total = qtd * unit;
    const disc  = s.disc.has(cod);
    return { cod, desc, qtd, qtdOrig, cls, unit, total, disc };
  });

  // filter
  rows = rows.filter(r => {
    if (!showDisc && r.disc) return false;
    if (!classes[r.cls]) return false;
    if (q && !r.cod.toLowerCase().includes(q) && !r.desc.toLowerCase().includes(q)) return false;
    return true;
  });

  // sort
  if (sortCol) {
    const key = { codigo:'cod', descricao:'desc', qtd:'qtd', classe:'cls', unitario:'unit', total:'total' }[sortCol];
    rows.sort((a,b) => {
      const av = a[key], bv = b[key];
      return typeof av === 'string' ? av.localeCompare(bv) * sortDir : (av - bv) * sortDir;
    });
  }

  // summary
  const allActive = rows.filter(r => !r.disc);
  const totalAtivo = allActive.reduce((s, r) => s + r.total, 0);
  const totalGeral = rows.reduce((s, r) => s + r.total, 0);
  const discCount  = rows.filter(r => r.disc).length;

  document.getElementById('summaryBar').innerHTML = `
    <div class="sum-card ${activeTab === 'hepr' ? 'hepr' : 'atox'}">
      <div class="val">${brl(totalAtivo)}</div>
      <div class="lbl">Total ativo</div>
    </div>
    <div class="sum-card">
      <div class="val">${num(allActive.reduce((s,r)=>s+r.qtd,0))} m</div>
      <div class="lbl">Metros ativos</div>
    </div>
    <div class="sum-card active-items">
      <div class="val">${allActive.length}</div>
      <div class="lbl">Itens ativos</div>
    </div>
    <div class="sum-card disc">
      <div class="val">${discCount}</div>
      <div class="lbl">Descontinuados</div>
    </div>
    <div class="sum-card">
      <div class="val">${brl(totalGeral)}</div>
      <div class="lbl">Total geral (vis.)</div>
    </div>
  `;

  // table body
  const tbody = document.getElementById('tableBody');
  if (rows.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }
  document.getElementById('emptyMsg').style.display = 'none';

  tbody.innerHTML = rows.map(r => {
    const modified = s.qtds[r.cod] !== undefined && s.qtds[r.cod] !== r.qtdOrig;
    const discCls  = r.disc ? 'discontinued' : '';
    const btnTxt   = r.disc ? '↩ Reativar' : '✕ Descontinuar';
    const btnCls   = r.disc ? 'disc-btn is-disc' : 'disc-btn';
    return `
    <tr class="${discCls}">
      <td class="code-cell">${r.cod}</td>
      <td class="desc-cell">${r.desc}</td>
      <td><span class="badge badge-${r.cls}">${r.cls}</span></td>
      <td class="num-cell">
        <div class="qty-wrap" style="justify-content:flex-end">
          <input
            class="qty-input ${modified ? 'modified' : ''}"
            type="text"
            value="${num(r.qtd)}"
            title="Clique para editar"
            onblur="onQtyChange('${r.cod}', this.value)"
            onkeydown="if(event.key==='Enter')this.blur()"
            onfocus="this.select()"
          >
        </div>
      </td>
      <td class="num-cell">${brl(r.unit)}</td>
      <td class="num-cell ${tcls}">${brl(r.total)}</td>
      <td style="text-align:center">
        <button class="${btnCls}" onclick="toggleDisc('${r.cod}')">${btnTxt}</button>
      </td>
    </tr>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════════
function exportCSV() {
  const s    = state[activeTab];
  const data = RAW[activeTab];
  const tabLabel = activeTab === 'hepr' ? 'HEPR' : 'HEPR_ATOX';

  const header = ['Cenario','Codigo','Descricao','Classe','Qtd_Ideal','Qtd_Ajustada','Vlr_Unit','Total','Status'];
  const rows = data.map(r => {
    const [cod, desc, qtdOrig, cls, unit] = r;
    const qtd   = s.qtds[cod] !== undefined ? s.qtds[cod] : qtdOrig;
    const total = (qtd * unit).toFixed(2);
    const st    = s.disc.has(cod) ? 'DESCONTINUADO' : 'ATIVO';
    return [tabLabel, cod, `"${desc}"`, cls, qtdOrig, qtd, unit.toFixed(4), total, st].join(';');
  });

  const csv  = [header.join(';'), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `CD_Recife_${tabLabel}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// INIT
applyFilters();
